name: test
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['30.1']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/magit/transient.git ../transient
          git clone --depth 1 https://github.com/purcell/inheritenv.git ../inheritenv
          git clone --depth 1 https://github.com/tarsius/cond-let.git ../cond-let
      - name: Byte-compile
        run: make compile
      - name: Run tests
        run: make test
